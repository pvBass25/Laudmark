<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 72" width="300" height="72" role="img" aria-label="TrustWall">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&amp;display=swap');
      .wm{font-family:'Space Grotesk',system-ui,-apple-system,sans-serif;font-size:33px;letter-spacing:-0.5px;}
      .ink{fill:#1A1A17;font-weight:700;}
      .acc{fill:#A8531B;font-weight:700;}
    </style>
  </defs>
  <!-- ICON: verified wall tile -->
  <rect x="8" y="8" width="56" height="56" rx="16" fill="#A8531B"/>
  <!-- brick seams (whisper of a wall) -->
  <line x1="8"  y1="27" x2="64" y2="27" stroke="#ffffff" stroke-opacity="0.20" stroke-width="2"/>
  <line x1="8"  y1="45" x2="64" y2="45" stroke="#ffffff" stroke-opacity="0.20" stroke-width="2"/>
  <line x1="30" y1="8"  x2="30" y2="27" stroke="#ffffff" stroke-opacity="0.13" stroke-width="2"/>
  <line x1="44" y1="45" x2="44" y2="64" stroke="#ffffff" stroke-opacity="0.13" stroke-width="2"/>
  <!-- verified check -->
  <path d="M21 37 L30 46 L51 23" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- WORDMARK -->
  <text x="82" y="47" class="wm"><tspan class="ink">Trust</tspan><tspan class="acc">Wall</tspan></text>
</svg>
