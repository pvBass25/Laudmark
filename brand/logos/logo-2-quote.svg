<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 72" width="300" height="72" role="img" aria-label="TrustWall">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&amp;display=swap');
      .wm{font-family:'Space Grotesk',system-ui,-apple-system,sans-serif;font-size:33px;letter-spacing:-0.5px;}
      .ink{fill:#1A1A17;font-weight:700;}
      .acc{fill:#8A2A52;font-weight:700;}
    </style>
  </defs>
  <!-- ICON: quotation tile -->
  <rect x="8" y="8" width="56" height="56" rx="16" fill="#8A2A52"/>
  <!-- two chunky quote marks (filled paths) -->
  <g fill="#ffffff">
    <path d="M19 21 h12 a3 3 0 0 1 3 3 v9 c0 8 -4 13 -12 16 a1.6 1.6 0 0 1 -1.6 -2.8 c4 -2.4 5.6 -5 5.6 -8.2 h-7 a3 3 0 0 1 -3 -3 v-11 a3 3 0 0 1 3 -3 z"/>
    <path d="M38 21 h12 a3 3 0 0 1 3 3 v9 c0 8 -4 13 -12 16 a1.6 1.6 0 0 1 -1.6 -2.8 c4 -2.4 5.6 -5 5.6 -8.2 h-7 a3 3 0 0 1 -3 -3 v-11 a3 3 0 0 1 3 -3 z"/>
  </g>
  <!-- WORDMARK -->
  <text x="82" y="47" class="wm"><tspan class="ink">Trust</tspan><tspan class="acc">Wall</tspan></text>
</svg>
